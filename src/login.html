<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpg" href="/favicon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/1.1.0/modern-normalize.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Lexend:wght@100..900&family=Michroma&display=swap"
      rel="stylesheet"
    />

    <title>Admin Login</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Вход администратора</h1>

      <form id="loginForm">
        <input name="name" placeholder="Name" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Войти</button>
      </form>

      <p id="loginError" style="color: red; margin-top: 12px"></p>
    </main>

    <script type="module" src="./js/admin/login.js"></script>
  </body>
</html>
